<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bai Lab 16 - Bo dem tuong tac</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f7f6; }
        .counter-container { border: 2px solid #ccc; display: inline-block; padding: 30px; border-radius: 10px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #counter-value { font-size: 4rem; font-weight: bold; margin: 20px 0; color: #333; transition: color 0.3s; }
        button { font-size: 1rem; padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-inc { background-color: #2ecc71; }
        .btn-dec { background-color: #e74c3c; }
        .btn-reset { background-color: #95a5a6; }
        .btn-fast { background-color: #3498db; }
        .positive { color: #2ecc71 !important; }
        .negative { color: #e74c3c !important; }
        .zero { color: #333 !important; }
    </style>
</head>
<body>

<div class="counter-container">
    <h2>BO DEM TUONG TAC</h2>
    <div id="counter-value">0</div>
    
    <button class="btn-dec" id="btn-decrease">Giam (-)</button>
    <button class="btn-reset" id="btn-reset">Dat lai (0)</button>
    <button class="btn-inc" id="btn-increase">Tang (+)</button>
    <button class="btn-fast" id="btn-fast-increase">Tang nhanh (+10)</button>
</div>

<script>
$(document).ready(function() {
    let count = 0;
    const MIN_VALUE = 0; 

    function updateUI() {
        $('#counter-value').text(count);

        if (count > 0) {
            $('#counter-value').removeClass('negative zero').addClass('positive');
        } else if (count < 0) {
            $('#counter-value').removeClass('positive zero').addClass('negative');
        } else {
            $('#counter-value').removeClass('positive negative').addClass('zero');
        }
    }

    $('#btn-increase').click(function() {
        count++;
        updateUI();
    });

    $('#btn-decrease').click(function() {
        if (MIN_VALUE !== null && count <= MIN_VALUE) {
            alert("Gia tri khong duoc nho hon " + MIN_VALUE);
            return;
        }
        count--;
        updateUI();
    });

    $('#btn-reset').click(function() {
        count = 0;
        updateUI();
    });

    $('#btn-fast-increase').click(function() {
        count += 10;
        updateUI();
    });
});
</script>

</body>
</html>
