<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Lab 17 - Giỏ hàng đơn giản</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .cart-table { width: 100%; max-width: 800px; margin: 0 auto; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .cart-table th, .cart-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .cart-table th { background-color: #34495e; color: white; }
        .quantity-control button { padding: 5px 10px; cursor: pointer; font-weight: bold; }
        .quantity-input { width: 40px; text-align: center; font-size: 1rem; margin: 0 5px; }
        .total-container { max-width: 800px; margin: 20px auto; text-align: right; font-size: 1.3rem; font-weight: bold; color: #e74c3c; }
    </style>
</head>
<body>

<h2 style="text-align: center;">GIỎ HÀNG CỦA BẠN</h2>

<table class="cart-table">
    <thead>
        <tr>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
    </thead>
    <tbody>
        <!-- Sản phẩm 1 -->
        <tr class="product-item" data-price="150000">
            <td>Điện thoại Nokia Cổ</td>
            <td>150,000 đ</td>
            <td class="quantity-control">
                <button class="btn-minus">-</button>
                <input type="text" class="quantity-input" value="1" readonly>
                <button class="btn-plus">+</button>
            </td>
            <td class="subtotal">150,000 đ</td>
        </tr>
        <!-- Sản phẩm 2 (Mở rộng nhiều sản phẩm) -->
        <tr class="product-item" data-price="450000">
            <td>Tai nghe Bluetooth Air</td>
            <td>450,000 đ</td>
            <td class="quantity-control">
                <button class="btn-minus">-</button>
                <input type="text" class="quantity-input" value="1" readonly>
                <button class="btn-plus">+</button>
            </td>
            <td class="subtotal">450,000 đ</td>
        </tr>
    </tbody>
</table>

<div class="total-container">
    Tổng hóa đơn: <span id="cart-total-price">600,000</span> đ
</div>

<script>
$(document).ready(function() {

    function calculateCart() {
        let totalCart = 0;

        $('.product-item').each(function() {
            let price = parseInt($(this).data('price'));
            let qty = parseInt($(this).find('.quantity-input').val());
            let subtotal = price * qty;
            totalCart += subtotal;

            $(this).find('.subtotal').text(subtotal.toLocaleString('vi-VN') + " đ");
        });

        $('#cart-total-price').text(totalCart.toLocaleString('vi-VN'));
    }

    $('.btn-plus').click(function() {
        let input = $(this).siblings('.quantity-input');
        let currentVal = parseInt(input.val());
        input.val(currentVal + 1);
        
        calculateCart();
    });

    $('.btn-minus').click(function() {
        let input = $(this).siblings('.quantity-input');
        let currentVal = parseInt(input.val());
        
        if (currentVal > 1) {
            input.val(currentVal - 1);
            calculateCart();
        } else {
            alert("Số lượng tối thiểu phải là 1!");
        }
    });
});
</script>

</body>
</html>
